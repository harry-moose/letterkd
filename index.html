<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABC Letters</title>
<style>
  :root{
    /* candy palette (same var names so the JS is untouched) */
    --cream:#fff6c9;   /* sunny  */
    --sage:#d9f4dd;    /* mint   */
    --pink:#ffe3d4;    /* peach  */
    --blue:#d9edff;    /* sky    */
    --brown:#6b4fc8;   /* crayon purple — letters & strokes */
    --brown-d:#4a3aa0;
    --red:#ff5d5d;     /* cherry */
    --ink:#333a56; --pill:#ffffff;
    --font:'Comic Sans MS','Chalkboard SE','Comic Neue','Baloo 2','Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:linear-gradient(180deg,#aee1ff 0%,#e7f6ff 60%,#f3fbff 100%);
    font-family:var(--font);display:flex;
    flex-direction:column;align-items:center;gap:16px;padding:18px;min-height:100vh;justify-content:center}

  #home{width:100%;max-width:760px;display:none;flex-direction:column;gap:18px;align-items:center}
  #home.on{display:flex}
  .title{font-size:clamp(30px,7vw,52px);font-weight:800;color:#3d5aa9;text-align:center;
    text-shadow:0 3px 0 #fff}
  .subtitle{color:#4a6b8a;font-weight:700;text-align:center;margin-top:-8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:14px;width:100%}
  .cell{aspect-ratio:1;border:0;border-radius:22px;cursor:pointer;
    font-family:var(--font);font-weight:800;font-size:clamp(26px,5.4vw,42px);color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.18);
    box-shadow:0 6px 0 rgba(0,0,0,.14), 0 10px 18px rgba(60,100,180,.18);
    display:flex;align-items:center;justify-content:center;gap:2px;
    opacity:0;transform:translateY(14px);animation:cellIn .5s ease forwards;
    transition:transform .16s ease}
  .cell:nth-child(6n+1){background:#ff9aa2}
  .cell:nth-child(6n+2){background:#ffb347}
  .cell:nth-child(6n+3){background:#ffd93d;color:#8a6d00;text-shadow:none}
  .cell:nth-child(6n+4){background:#7ed48f}
  .cell:nth-child(6n+5){background:#6fc7f2}
  .cell:nth-child(6n){background:#c39bd3}
  .cell:hover{transform:translateY(-4px) rotate(-3deg) scale(1.07)}
  .cell small{font-size:.62em;font-weight:800;opacity:.92;align-self:flex-end;margin-bottom:.35em}
  @keyframes cellIn{to{opacity:1;transform:none}}

  #deck{display:none;flex-direction:column;gap:16px;align-items:center;width:100%;max-width:760px}
  #deck.on{display:flex}
  .stage{position:relative;width:100%;aspect-ratio:16/9;
    border-radius:26px;overflow:hidden;
    border:8px solid #fff;
    box-shadow:0 16px 40px rgba(60,100,180,.28);
    background:var(--cream);transition:background .6s ease;cursor:pointer}

  /* sun + clouds (reusing the old blob divs) */
  .blob{position:absolute;pointer-events:none;z-index:0}
  .b1{width:76px;height:76px;background:#ffd93d;border-radius:50%;right:5%;top:9%;
    box-shadow:0 0 34px 12px rgba(255,217,61,.55);animation:sunPulse 5s ease-in-out infinite}
  .b2{width:110px;height:40px;background:#fff;border-radius:99px;left:6%;top:12%;opacity:.95;
    box-shadow:26px -15px 0 5px #fff,-24px -9px 0 1px #fff;animation:cloudMove 26s ease-in-out infinite}
  .b3{width:150px;height:52px;background:#fff;border-radius:99px;left:34%;bottom:9%;opacity:.75;
    box-shadow:34px -19px 0 7px #fff,-30px -12px 0 2px #fff;animation:cloudMove 34s ease-in-out infinite reverse}
  @keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
  @keyframes cloudMove{0%,100%{transform:translateX(-8%)}50%{transform:translateX(16%)}}

  .layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    opacity:0;transform:scale(.985);transition:opacity .4s ease,transform .5s ease;pointer-events:none;z-index:1}
  .layer.on{opacity:1;transform:scale(1)}

  .floaty{animation:floatY 3.4s ease-in-out infinite}
  .bigG{font-size:44vh;font-weight:800;color:var(--brown);line-height:1;
    text-shadow:0 5px 0 rgba(0,0,0,.10);
    transform:scale(.4);transition:transform .55s cubic-bezier(.2,1.4,.4,1)}
  .bigG.pop{transform:scale(1)}
  @media(max-width:800px){.bigG{font-size:40vw}}

  .card{display:flex;flex-direction:column;align-items:center;gap:10px;
    opacity:0;transform:translateY(24px) scale(.9);transition:all .45s cubic-bezier(.2,1.35,.4,1)}
  .card.show{opacity:1;transform:none}
  .emoji{font-size:clamp(52px,14vw,140px);line-height:1;animation:bob 2.6s ease-in-out infinite;transform-origin:center}
  .word{font-size:clamp(26px,7vw,64px);font-weight:800;color:var(--ink);letter-spacing:.5px}
  .word b{color:var(--red)}

  .pair{display:flex;align-items:flex-end;gap:.12em;color:var(--brown);font-weight:800;line-height:.9;animation:floatY 3.4s ease-in-out infinite;text-shadow:0 5px 0 rgba(0,0,0,.10)}
  .cg{font-size:40vh}.cg.sm{font-size:27vh;animation:bob 2.8s ease-in-out infinite}
  @media(max-width:800px){.cg{font-size:36vw}.cg.sm{font-size:24vw}}

  .qwrap{display:flex;gap:5%;align-items:center}
  .qopt{font-size:22vh;font-weight:800;color:var(--brown);cursor:pointer;pointer-events:auto;
    background:#fff;border-radius:28px;padding:1.5vh 3.5vh;
    box-shadow:0 7px 0 rgba(0,0,0,.12), 0 12px 20px rgba(60,100,180,.18);
    animation:bob 3s ease-in-out infinite;transition:transform .2s}
  .qopt:nth-child(1){border:6px solid #ff9aa2}
  .qopt:nth-child(2){border:6px solid #7ed48f;animation-delay:.4s}
  .qopt:nth-child(3){border:6px solid #6fc7f2;animation-delay:.8s}
  .qopt:hover{transform:scale(1.08) rotate(2deg)}
  .qopt.right{animation:winPop .6s ease;color:var(--red);border-color:#ffd93d}
  .qopt.wrong{animation:shake .45s ease}
  .qopt.dim{opacity:.35;pointer-events:none}
  @media(max-width:800px){.qopt{font-size:17vh}}
  @keyframes winPop{0%{transform:scale(1)}40%{transform:scale(1.3) rotate(-4deg)}100%{transform:scale(1.1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}

  svg{width:66%;height:90%}
  .baseline{stroke:#a8cbea;stroke-width:3;stroke-dasharray:8 10}
  .guide{fill:none;stroke:#d9d2f2;stroke-width:26;stroke-linecap:round;stroke-linejoin:round;opacity:.75}
  .draw{fill:none;stroke:var(--brown);stroke-width:26;stroke-linecap:round;stroke-linejoin:round}
  .pen{fill:var(--red);opacity:0}
  .startdot{fill:var(--red);opacity:0;transform-box:fill-box;transform-origin:center}
  .startdot.pulse{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

  .caption{position:absolute;left:50%;bottom:5.5%;transform:translateX(-50%) translateY(10px);
    background:var(--pill);color:var(--ink);font-weight:700;
    font-size:clamp(14px,3vw,24px);padding:.5em 1.2em;border-radius:40px;
    border:4px solid #ffd93d;
    box-shadow:0 6px 16px rgba(60,100,180,.18);white-space:nowrap;opacity:0;transition:all .4s;max-width:94%;overflow:hidden;text-overflow:ellipsis;z-index:6}
  .caption.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .caption b{color:var(--red)}

  .fx{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:5}
  .note-fx{position:absolute;font-weight:800;animation:noteFloat linear infinite}
  .conf{position:absolute;top:-8%;width:12px;height:15px;border-radius:3px}
  .spark{position:absolute;font-size:22px;animation:sparkle 1s ease-out forwards}
  @keyframes sparkle{0%{transform:scale(.3) rotate(0);opacity:0}30%{opacity:1}100%{transform:scale(1.4) rotate(40deg) translateY(-30px);opacity:0}}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-3.2%)}}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(2deg)}}
  @keyframes noteFloat{0%{transform:translateY(18px) rotate(-10deg) scale(.8);opacity:0}
    20%{opacity:.95}100%{transform:translateY(-170px) rotate(12deg) scale(1.12);opacity:0}}
  @keyframes confettiFall{0%{top:-8%;transform:translateX(0) rotate(0);opacity:0}
    10%{opacity:1}88%{opacity:1}100%{top:108%;transform:translateX(var(--dx)) rotate(var(--rot));opacity:.5}}

  .nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  button{font-family:var(--font);font-weight:800;font-size:16px;color:#fff;background:#ff9f43;
    border:0;border-radius:999px;padding:12px 24px;cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.14)}
  button:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.14)}
  button:disabled{opacity:.35;cursor:default;box-shadow:none}
  button.ghost{background:#58c472}
  .count{font-weight:800;color:#3d5aa9;min-width:60px;text-align:center;font-size:16px}
  .note{color:#4a6b8a;font-size:12.5px;text-align:center}
</style>
</head>
<body>

  <div id="home" class="on">
    <div class="title">🌈 Letter Time! ☀️</div>
    <div class="subtitle">Pick a letter to play!</div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="deck">
    <div class="stage" id="stage">
      <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
      <div class="layer" id="lSound"><div class="floaty"><div class="bigG" id="bigLetter">G</div></div></div>
      <div class="layer" id="lWords">
        <div class="card" id="card"><div class="emoji"></div><div class="word"></div></div>
      </div>
      <div class="layer" id="lForm">
        <svg viewBox="0 0 400 400">
          <line class="baseline" x1="46" y1="300" x2="354" y2="300"></line>
          <g id="guideG"></g><g id="inkG"></g>
          <circle class="startdot" id="sdot" r="13"></circle>
          <circle class="pen" id="pen" r="15"></circle>
        </svg>
      </div>
      <div class="layer" id="lQuiz"><div class="qwrap" id="qwrap"></div></div>
      <div class="layer" id="lCompare">
        <div class="pair"><span class="cg" id="cmpBig">G</span><span class="cg sm" id="cmpSmall">g</span></div>
      </div>
      <div class="fx" id="fx"></div>
      <div class="caption" id="cap"></div>
    </div>
    <div class="nav">
      <button class="ghost" id="homeBtn">🏠 Letters</button>
      <button id="prev">← Prev</button>
      <span class="count" id="count"></span>
      <button id="next">Next →</button>
    </div>
    <div class="note">tap the picture to replay • silent by design — narration goes on in Resolve</div>
  </div>

<script>
const NS="http://www.w3.org/2000/svg";
/* ---------- geometry ---------- */
const CT=80, BL=300, XH=170, DS=370;
function Ln(x1,y1,x2,y2,n=24){let o=[];for(let i=0;i<=n;i++)o.push([x1+(x2-x1)*i/n,y1+(y2-y1)*i/n]);return o;}
function A(cx,cy,r,a0,a1,n=60){let o=[];for(let i=0;i<=n;i++){const t=(a0+(a1-a0)*i/n)*Math.PI/180;o.push([cx+r*Math.cos(t),cy-r*Math.sin(t)]);}return o;}
function J(...s){let o=[];s.forEach(x=>o=o.concat(x));return o;}
function dot(x,y){return A(x,y,6,0,360,20);}
const toPath=a=>"M "+a.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L ");

};

/* ---------- audio removed: silent version ---------- */
const sfx={pop(){},chime(){},tada(){},wrong(){},slide(){}};

const stripTags=h=>h.replace(/<[^>]*>/g,'').replace(/…/g,',').replace(/[“”➜]/g,'');

/* ---------- DOM ---------- */
const home=document.getElementById('home'), deck=document.getElementById('deck');
const stage=document.getElementById('stage'), cap=document.getElementById('cap'), fx=document.getElementById('fx');
const layers={sound:document.getElementById('lSound'),words:document.getElementById('lWords'),
  form:document.getElementById('lForm'),quiz:document.getElementById('lQuiz'),compare:document.getElementById('lCompare')};
const bigLetter=document.getElementById('bigLetter'), card=document.getElementById('card');
const cardE=card.querySelector('.emoji'), cardW=card.querySelector('.word');

const pen=document.getElementById('pen'), sdot=document.getElementById('sdot');
const cmpBig=document.getElementById('cmpBig'), cmpSmall=document.getElementById('cmpSmall');
const qwrap=document.getElementById('qwrap');

const grid=document.getElementById('grid');
[...'abcdefghijklmnopqrstuvwxyz'].forEach((ch,i)=>{
  const b=document.createElement('button');b.className='cell';
  b.style.animationDelay=(i*28)+'ms';
  b.innerHTML=ch.toUpperCase()+'<small>'+ch+'</small>';
  b.onclick=()=>{location.hash=ch;};
  grid.appendChild(b);
});

/* ---------- fx ---------- */
function clearFx(){fx.innerHTML='';}
function notes(){for(let i=0;i<6;i++){const n=document.createElement('div');n.className='note-fx';
  n.textContent=i%2?'♫':'♪';
  n.style.left=(36+Math.random()*32)+'%';n.style.top=(38+Math.random()*22)+'%';
  n.style.fontSize=(22+Math.random()*20)+'px';
  n.style.color=Math.random()<.5?'var(--red)':'var(--brown)';
  n.style.animationDuration=(2.4+Math.random()*1.6)+'s';
  n.style.animationDelay=(Math.random()*2.2)+'s';
  fx.appendChild(n);} }
function confetti(count){const cols=['#c74646','#966e5a','#e6b422','#8fae7a','#e59ab0','#7c5a48'];
  for(let i=0;i<(count||44);i++){const c=document.createElement('div');c.className='conf';
   c.style.left=Math.random()*100+'%';c.style.background=cols[i%cols.length];
   c.style.setProperty('--dx',(Math.random()*90-45)+'px');
   c.style.setProperty('--rot',(180+Math.random()*560)+'deg');
   if(Math.random()<.5){c.style.width='10px';c.style.height='10px';c.style.borderRadius='50%';}
   const d=1.7+Math.random()*1.3;
   c.style.animation=`confettiFall ${d}s ease-in ${(Math.random()*.35).toFixed(2)}s both`;
   fx.appendChild(c);} }
function sparkles(){for(let i=0;i<7;i++){const s=document.createElement('div');s.className='spark';
  s.textContent='✨';s.style.left=(30+Math.random()*40)+'%';s.style.top=(30+Math.random()*35)+'%';
  s.style.animationDelay=(Math.random()*.4)+'s';fx.appendChild(s);}}

/* ---------- drawing ---------- */
let token=0;
function show(k){for(const key in layers)layers[key].classList.toggle('on',key===k);}
function say(h,spoken){cap.innerHTML=h;cap.classList.add('on');speak(spoken!==undefined?spoken:stripTags(h));}
function hush(){cap.classList.remove('on');}
function newLetter(strokes){inkG.innerHTML='';guideG.innerHTML='';
  strokes.forEach(s=>{const p=document.createElementNS(NS,'path');p.setAttribute('class','guide');p.setAttribute('d',toPath(s));guideG.appendChild(p);});}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function strokeAnim(ptsArr,ms){return new Promise(res=>{
  const my=token;
  const p=document.createElementNS(NS,'path');p.setAttribute('class','draw');p.setAttribute('d',toPath(ptsArr));inkG.appendChild(p);
  const len=p.getTotalLength();p.style.strokeDasharray=len;p.style.strokeDashoffset=len;
  const s=p.getPointAtLength(0);sdot.setAttribute('cx',s.x);sdot.setAttribute('cy',s.y);sdot.style.opacity=1;
  pen.style.opacity=1;let el=0,last=performance.now();
  (function step(now){if(token!==my)return res();el+=(now-last);last=now;
    let pr=Math.min(1,el/ms);p.style.strokeDashoffset=len*(1-pr);
    const q=p.getPointAtLength(len*pr);pen.setAttribute('cx',q.x);pen.setAttribute('cy',q.y);
    if(pr<1)requestAnimationFrame(step);else{pen.style.opacity=0;sdot.style.opacity=0;res();}
  })(performance.now());});}
async function drawLetter(strokes,slow){
  const my=token;
  for(const s of strokes){
    if(token!==my)return;
    await strokeAnim(s, Math.max(slow?1400:900, s.length*(slow?34:22)));
    if(token!==my)return;
    await wait(380);
  }
}

/* ---------- quiz ---------- */
function quizSlide(target,isSmall){
  return {bg:'blue',enter:async()=>{
    show('quiz');
    const pool='abcdefghijklmnopqrstuvwxyz'.split('').filter(c=>c!==target);
    const opts=[target];
    while(opts.length<3){const c=pool.splice(Math.floor(Math.random()*pool.length),1)[0];opts.push(c);}
    opts.sort(()=>Math.random()-.5);
    qwrap.innerHTML='';
    const shown=c=>isSmall?c:c.toUpperCase();
    opts.forEach(c=>{
      const d=document.createElement('div');d.className='qopt';d.textContent=shown(c);
      d.onclick=(ev)=>{ev.stopPropagation();
        if(c===target){d.classList.add('right');sfx.tada();confetti(36);sparkles();
          [...qwrap.children].forEach(o=>{if(o!==d)o.classList.add('dim');});
          say('Yes! That’s '+(isSmall?'small ':'big ')+shown(target)+'! 🎉');
        }else{d.classList.add('wrong');sfx.wrong();say('Almost — try again!');
          setTimeout(()=>d.classList.remove('wrong'),500);}
      };
      qwrap.appendChild(d);
    });
    say('Can you find '+(isSmall?'small ':'big ')+shown(target)+'? Tap it!');
  }};
}

/* ---------- slides ---------- */
let slides=[], index=0, current=null;
const prevB=document.getElementById('prev'), nextB=document.getElementById('next'), countE=document.getElementById('count');

function buildSlides(ch){
  const U=ch.toUpperCase();
  const words=WORDS[ch]||[];
  const soundHtml=SOUND[ch]||('<b>'+U+'</b> says … “'+ch+', '+ch+', '+ch+'”');
  const soundSpoken=SOUNDSPOKEN[ch]||(U+' says. '+ch+'. '+ch+'. '+ch+'.');
  const s=[];
  const soundSlide=(html,spoken)=>({bg:'cream',enter:async()=>{show('sound');notes();
    bigLetter.textContent=U;bigLetter.classList.remove('pop');void bigLetter.offsetWidth;bigLetter.classList.add('pop');
    sfx.pop();melody();say(html,spoken);}});
  s.push(soundSlide('This is the letter <b>'+U+'</b>'));
  s.push(soundSlide(soundHtml,soundSpoken));
  s.push(soundSlide('Can you say it? &nbsp;<b>'+ch+'!</b>','Can you say it? '+ch+'!'));
  for(const [e,w] of words){
    s.push({bg:'sage',enter:async()=>{show('words');card.classList.remove('show');void card.offsetWidth;
      cardE.textContent=e;
      let html, capHtml, spoken;
      if(ch==='x'){html=w.slice(0,-1)+'<b>'+w.slice(-1)+'</b>';capHtml=html+' — <b>x</b> at the end!';spoken=w+'. x at the end!';}
      else{html='<b>'+w[0]+'</b>'+w.slice(1);capHtml='<b>'+w[0]+'</b>… '+w;spoken=ch+', '+w;}
      cardW.innerHTML=html;card.classList.add('show');sfx.pop();say(capHtml,spoken);}});
  }
  s.push({bg:'sage',enter:async()=>{show('words');confetti(28);sfx.chime();card.classList.remove('show');void card.offsetWidth;
    cardE.textContent=words.map(x=>x[0]).slice(0,3).join('');cardW.innerHTML='<b>'+U+'</b> words!';
    card.classList.add('show');say('So many <b>'+U+'</b> words! 🎉');}});
  s.push({bg:'pink',enter:async()=>{show('form');newLetter(BIG[U]);
    say('Watch how to write <b>big '+U+'</b>');await drawLetter(BIG[U]);sfx.chime();say('That’s <b>big '+U+'</b>! 👏');}});
  s.push({bg:'pink',enter:async()=>{show('form');newLetter(BIG[U]);sdot.classList.add('pulse');
    say('Your turn! <b>Trace</b> it with your finger','Your turn! Trace big '+U+' with your finger, nice and slow');
    await drawLetter(BIG[U],true);sdot.classList.remove('pulse');sfx.chime();say('Beautiful <b>'+U+'</b>! ⭐');}});
  s.push(quizSlide(ch,false));
  s.push({bg:'pink',enter:async()=>{show('form');newLetter(SMALL[ch]);
    say('Now <b>small '+ch+'</b>');await drawLetter(SMALL[ch]);sfx.chime();say('That’s <b>small '+ch+'</b>! ⭐');}});
  s.push({bg:'pink',enter:async()=>{show('form');newLetter(SMALL[ch]);sdot.classList.add('pulse');
    say('<b>Trace</b> small '+ch+' with your finger','Trace small '+ch+' with your finger');
    await drawLetter(SMALL[ch],true);sdot.classList.remove('pulse');sfx.chime();say('Lovely tracing! 👏');}});
  s.push(quizSlide(ch,true));
  s.push({bg:'cream',enter:async()=>{show('compare');
    cmpBig.textContent=U;cmpSmall.textContent=ch;sfx.tada();melody();
    say('Big <b>'+U+'</b> and small <b>'+ch+'</b> — great work!');confetti(56);}});
  return s;
}

async function goTo(i){
  index=Math.max(0,Math.min(slides.length-1,i));
  const my=++token;
  pen.style.opacity=0;sdot.style.opacity=0;sdot.classList.remove('pulse');hush();clearFx();
  prevB.disabled=index===0; nextB.disabled=index===slides.length-1;
  countE.textContent=(index+1)+' / '+slides.length;
  const s=slides[index]; stage.style.background='var(--'+s.bg+')';
  sfx.slide();
  await new Promise(r=>setTimeout(r,120)); if(token!==my)return;
  await s.enter();
}

/* ---------- routing ---------- */
function route(){
  const h=(location.hash||'').replace('#','').toLowerCase();
  if(h && SMALL[h]){
    current=h; slides=buildSlides(h);
    home.classList.remove('on'); deck.classList.add('on');
    goTo(0);
  } else {
    token++; current=null;
      deck.classList.remove('on'); home.classList.add('on');
  }
}
window.addEventListener('hashchange',route);
document.getElementById('homeBtn').onclick=()=>{location.hash='';};
prevB.onclick=()=>goTo(index-1);
nextB.onclick=()=>goTo(index+1);
stage.onclick=()=>goTo(index);
document.addEventListener('keydown',e=>{
  if(!current)return;
  if(e.key==='ArrowRight')goTo(index+1);
  if(e.key==='ArrowLeft')goTo(index-1);
  if(e.key==='Escape')location.hash='';
});
route();
</script>
